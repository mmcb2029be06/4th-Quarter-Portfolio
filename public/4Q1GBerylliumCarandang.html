<!DOCTYPE html>
<html>
  <head>
    <title>Movie Rating</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
      <h1 class="title">Movie Rating</h1>

      <div>
      <form method="post">
        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" required><br><br>

        <label for="year">Year:</label><br>
        <input type="text" id="year" name="year" required><br><br>

        <label for="genre">Genre:</label> <br>
        <select id="genre" name="genre" required>
        <option value="Drama">Drama</option>
        <option value="Comedy">Comedy</option>
        <option value="Action">Action</option>
        <option value="Adventure">Adventure</option>
        <option value="Horror">Horror</option>
        <option value="Thriller">Thriller</option>
        <option value="Sci-fi">Sci-fi</option>
        <option value="Romance">Romance</option>
        <option value="Mystery">Mystery</option>
        <option value="Superhero">Superhero</option>
        </select><br><br>

        <label>Rating:</label>
        <div class="stars" id="ratingStars">
          <span class="star" data-value="★">&#9733;</span>
          <span class="star" data-value="★★">&#9733;</span>
          <span class="star" data-value="★★★">&#9733;</span>
          <span class="star" data-value="★★★★">&#9733;</span>
          <span class="star" data-value="★★★★★">&#9733;</span>
        </div> <br>

        <button type="submit" id="submit">Add Movie</button>

      </form>

      <h1 class="title">Movie List</h1>

      <table id="list">
        
      </table>

      </div>
      
  </body>
    <script>
      const KEY = 'movies'; // we will be storing everything on key: notes
      let selectedRating = 0;
      render();
    
      //loads the saved data when needed from the set key
      function loadNotes() {
        const raw = localStorage.getItem(KEY);

        if (raw){
          return JSON.parse(raw);
        }
        else{
          return [];
        }
      }

      //saves any string pair into the set key
      function saveNotes(entries) {
        localStorage.setItem(KEY, JSON.stringify(entries));
      }


      //renders the list of movies
      function render() {
        const notes = loadNotes();
        const list = document.getElementById('list');    

        let output = ``;
        
        
        //adds a new entry
        for (let i = 0; i < notes.length; i++) { 
          output += `<tr>
            <td>${notes[i].title} (${notes[i].year}) - ${notes[i].genre}, Rating: ${notes[i].rating} <button data-i="${i}" id="button" >Delete</button> </td>
                
          </tr>`;
          }

        list.innerHTML = output;
        }
        

        //function when submitting
        const submitButton = document.getElementById('submit');
        submitButton.addEventListener("click", function(e) {
          e.preventDefault(); // to avoid immediately resetting the data
          const title = document.getElementById('title').value.trim();
          const year = document.getElementById('year').value.trim();
          const genre = document.getElementById('genre').value.trim();
          const rating = selectedRating.trim();

          const obj = { // this is where it is all saved as an object
            title: title,
            year: year,
            genre: genre,
            rating: rating
          };

          const notes = loadNotes();
          let existingMovie = 0;

          for (i in notes){

          if (notes[i].title == title){

          existingMovie += 1; // if it sees an already existing movie, it adds one to this variable

          } }

          if (existingMovie != 0){ // to see if there was an existing movie
            // object is inserted in a specific slot
            notes.splice(i,1,obj);           
            saveNotes(notes);          // store updated array in localStorage
            render();
          }
          else{
            notes.push(obj); // object is pushed in an array
            saveNotes(notes);
            render(); // store updated array in localStorage
          }

        });

        //detects if something was clicked within the list
        document.getElementById('list').onclick = function(event)
    {
      // Step 1: Check if the thing clicked is a button
      if (event.target.tagName.toLowerCase() === 'button'){

        // Step 2: Get the index number from the button
          let index = event.target.dataset.i;
          index = Number(index);

          // Step 3: Load the notes from localStorage
          const notes = loadNotes();

          // Step 4: Remove one note at that index
          notes.splice(index, 1);        // remove one item

          // Step 5: Save the updated notes back to localStorage
          saveNotes(notes);

          // Step 6: Show the new list on the page
          render();
      }
      else{
        return;
      }
    };

       // Handle star clicks
      document.querySelectorAll(".star").forEach(star => {
        star.addEventListener("click", function() {
          selectedRating = this.getAttribute("data-value");
          updateStars(selectedRating);
        });
      });

      function updateStars(rating) {
        document.querySelectorAll(".star").forEach(star => {
          star.classList.remove("selected");
          if (star.getAttribute("data-value") <= rating) {
            star.classList.add("selected");
          }
        });
      }
    
    
    
    </script>
</html>
